<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  color: #e6edf3;
  font-family: 'Segoe UI', Arial, sans-serif;

}

  position: absolute;

  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

<body>
<h2>NBA 2025–26 · Wins vs. 3-Pointers Made per Game</h2>
<div class="subtitle">Bubble color = 3PT% &nbsp;·&nbsp; 🔵 Lower % &nbsp;→&nbsp; 🔴 Higher %</div>
<div id="chart-wrap">
  <canvas id="c" width="799" height="503"></canvas>
  <div id="tooltip" style="display: none; left: 421px; top: 114.5px;"><div class="tn" style="color:rgb(48,208,128)">Boston Celtics</div>
      <div><span class="st">Wins: </span><span class="vl">56</span></div>
      <div><span class="st">3PM/G: </span><span class="vl">15.5</span></div>
      <div><span class="st">3PT%: </span><span class="vl">36.7%</span></div></div>
</div>
<div class="legend-row">
  <span>Low 3PT%</span>
  <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
    <canvas id="lg" width="180" height="13"></canvas>
    <div id="lg-labels" style="display:flex;justify-content:space-between;width:180px;font-size:10px;color:#8b949e;"><span style="text-align: left;">34%</span><span style="text-align: center;">35%</span><span style="text-align: center;">36%</span><span style="text-align: center;">37%</span><span style="text-align: center;">38%</span><span style="text-align: center;">39%</span><span style="text-align: right;">40%</span></div>
  </div>
  <span>High 3PT%</span>
</div>

<script>
const teams = [
  { name:"Oklahoma City Thunder", abbr:"OKC", wins:64, fg3m:13.8, fg3pct:0.365 },
  { name:"San Antonio Spurs",     abbr:"SAS", wins:62, fg3m:13.6, fg3pct:0.359 },
  { name:"Detroit Pistons",       abbr:"DET", wins:60, fg3m:11.0, fg3pct:0.356 },
  { name:"Boston Celtics",        abbr:"BOS", wins:56, fg3m:15.5, fg3pct:0.367 },
  { name:"Denver Nuggets",        abbr:"DEN", wins:54, fg3m:14.2, fg3pct:0.396 },
  { name:"New York Knicks",       abbr:"NYK", wins:53, fg3m:14.2, fg3pct:0.373 },
  { name:"Los Angeles Lakers",    abbr:"LAL", wins:53, fg3m:11.8, fg3pct:0.359 },
  { name:"Cleveland Cavaliers",   abbr:"CLE", wins:52, fg3m:14.3, fg3pct:0.360 },
  { name:"Houston Rockets",       abbr:"HOU", wins:52, fg3m:11.5, fg3pct:0.364 },
  { name:"Minnesota Timberwolves",abbr:"MIN", wins:49, fg3m:13.8, fg3pct:0.370 },
  { name:"Toronto Raptors",       abbr:"TOR", wins:46, fg3m:11.4, fg3pct:0.354 },
  { name:"Atlanta Hawks",         abbr:"ATL", wins:46, fg3m:14.6, fg3pct:0.371 },
  { name:"Philadelphia 76ers",    abbr:"PHI", wins:45, fg3m:12.3, fg3pct:0.349 },
  { name:"Phoenix Suns",          abbr:"PHO", wins:45, fg3m:14.8, fg3pct:0.361 },
  { name:"Orlando Magic",         abbr:"ORL", wins:45, fg3m:11.7, fg3pct:0.343 },
  { name:"Charlotte Hornets",     abbr:"CHO", wins:44, fg3m:16.4, fg3pct:0.378 },
  { name:"Miami Heat",            abbr:"MIA", wins:43, fg3m:13.7, fg3pct:0.361 },
  { name:"Portland Trail Blazers",abbr:"POR", wins:42, fg3m:14.5, fg3pct:0.343 },
  { name:"LA Clippers",           abbr:"LAC", wins:42, fg3m:12.4, fg3pct:0.368 },
  { name:"Golden State Warriors", abbr:"GSW", wins:37, fg3m:15.7, fg3pct:0.356 },
  { name:"Milwaukee Bucks",       abbr:"MIL", wins:32, fg3m:15.1, fg3pct:0.387 },
  { name:"Chicago Bulls",         abbr:"CHI", wins:31, fg3m:14.3, fg3pct:0.356 },
  { name:"Sacramento Kings",      abbr:"SAC", wins:22, fg3m:10.3, fg3pct:0.340 },
  { name:"Utah Jazz",             abbr:"UTA", wins:22, fg3m:12.6, fg3pct:0.345 },
  { name:"New Orleans Pelicans",  abbr:"NOP", wins:26, fg3m:11.1, fg3pct:0.347 },
  { name:"Dallas Mavericks",      abbr:"DAL", wins:26, fg3m:11.0, fg3pct:0.344 },
  { name:"Memphis Grizzlies",     abbr:"MEM", wins:25, fg3m:13.9, fg3pct:0.353 },
  { name:"Brooklyn Nets",         abbr:"BRK", wins:20, fg3m:13.1, fg3pct:0.340 },
  { name:"Indiana Pacers",        abbr:"IND", wins:19, fg3m:13.4, fg3pct:0.356 },
  { name:"Washington Wizards",    abbr:"WAS", wins:17, fg3m:13.0, fg3pct:0.359 },
];

const pcts = teams.map(t=>t.fg3pct);
const minP = Math.min(...pcts), maxP = Math.max(...pcts);

function heatColor(val) {
  const t = (val - minP) / (maxP - minP);
  const stops = [
    [0.0,  [30,100,220]],
    [0.25, [20,180,230]],
    [0.5,  [50,210,120]],
    [0.75, [240,200,30]],
    [1.0,  [230,40,40]],
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const [t0,c0] = stops[i], [t1,c1] = stops[i+1];
    if (t >= t0 && t <= t1) {
      const f = (t-t0)/(t1-t0);
      return c0.map((v,j)=>Math.round(v+f*(c1[j]-v)));
    }
  }
  return [230,40,40];
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const PAD = {top:34, right:44, bottom:58, left:64};
const MIN_W=15, MAX_W=68, MIN_3=9.5, MAX_3=17.2;

function px(wins,W){ return PAD.left+(wins-MIN_W)/(MAX_W-MIN_W)*(W-PAD.left-PAD.right); }
function py(fg3m,H){ return H-PAD.bottom-(fg3m-MIN_3)/(MAX_3-MIN_3)*(H-PAD.top-PAD.bottom); }

function draw(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H);

  const fs = Math.max(9, Math.round(W/78));
  const R = Math.max(7, W/68) * 1.265;

  // grid lines
  const winTicks=[20,30,40,50,60];
  winTicks.forEach(w=>{
    const x=px(w,W);
    ctx.strokeStyle='#1c2129'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,H-PAD.bottom); ctx.stroke();
    ctx.fillStyle='#6e7681'; ctx.font=`${fs}px Arial`; ctx.textAlign='center';
    ctx.fillText(w, x, H-PAD.bottom+15);
  });
  const threeTicks=[10,11,12,13,14,15,16,17];
  threeTicks.forEach(v=>{
    const y=py(v,H);
    ctx.strokeStyle='#1c2129'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(W-PAD.right,y); ctx.stroke();
    ctx.fillStyle='#6e7681'; ctx.font=`${fs}px Arial`; ctx.textAlign='right';
    ctx.fillText(v.toFixed(1), PAD.left-8, y+4);
  });

  // axes
  ctx.strokeStyle='#30363d'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left,PAD.top); ctx.lineTo(PAD.left,H-PAD.bottom); ctx.lineTo(W-PAD.right,H-PAD.bottom); ctx.stroke();

  // axis labels
  ctx.fillStyle='#8b949e'; ctx.font=`bold ${fs+1}px Arial`; ctx.textAlign='center';
  ctx.fillText('Wins', W/2, H-10);
  ctx.save(); ctx.translate(14, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('3PM per Game', 0, 0); ctx.restore();

  // Compute positions
  const positions = teams.map(t=>({ t, x:px(t.wins,W), y:py(t.fg3m,H) }));

  // Detect which bubbles are overlapped (covered by a later-drawn bubble)
  const overlapped = new Set();
  for(let i=0;i<positions.length;i++){
    for(let j=i+1;j<positions.length;j++){
      const a=positions[i], b=positions[j];
      if(Math.hypot(a.x-b.x, a.y-b.y) < R*1.8){
        overlapped.add(i); // mark the earlier one as needing a callout
      }
    }
  }

  // Draw glows first
  positions.forEach(({t,x,y})=>{
    const [r,g,b]=heatColor(t.fg3pct);
    const grd=ctx.createRadialGradient(x,y,0,x,y,R*2);
    grd.addColorStop(0,`rgba(${r},${g},${b},0.25)`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(x,y,R*2,0,2*Math.PI);
    ctx.fillStyle=grd; ctx.fill();
  });

  // Draw bubbles
  positions.forEach(({t,x,y})=>{
    const [r,g,b]=heatColor(t.fg3pct);
    const bg=ctx.createRadialGradient(x-R*0.3,y-R*0.3,0,x,y,R);
    bg.addColorStop(0,`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},0.95)`);
    bg.addColorStop(1,`rgba(${r},${g},${b},0.9)`);
    ctx.beginPath(); ctx.arc(x,y,R,0,2*Math.PI);
    ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle=`rgba(${r},${g},${b},1)`;
    ctx.lineWidth=1.5; ctx.stroke();
  });

  // Draw in-bubble abbreviations for non-overlapped bubbles
  const lfs=Math.max(7,Math.round(R*0.72));
  positions.forEach(({t,x,y},i)=>{
    if(overlapped.has(i)) return;
    ctx.fillStyle='rgba(0,0,0,0.9)';
    ctx.font=`bold ${lfs}px Arial`; ctx.textAlign='center';
    ctx.fillText(t.abbr, x, y+lfs*0.38);
  });

  // Draw leader lines + callout labels for overlapped bubbles
  // Place callouts above the bubble, staggered to avoid each other
  const calloutFs = Math.max(8, Math.round(W/90));
  const usedCalloutY = []; // track used Y positions for staggering

  positions.forEach(({t,x,y},i)=>{
    if(!overlapped.has(i)) return;
    const [r,g,b]=heatColor(t.fg3pct);

    // Place callout up and to the right
    const offset = (R + 22) / 2;
    let cx = x + offset;
    let cy = y - offset;

    // Stagger if too close to another callout
    for(const used of usedCalloutY){
      if(Math.abs(used.y - cy) < 14 && Math.abs(used.x - cx) < 40){
        cy = used.y - 14;
      }
    }
    cy = Math.max(PAD.top + calloutFs, cy);
    usedCalloutY.push({x: cx, y: cy});

    // Leader line from bubble edge toward callout
    const angle = Math.atan2(cy - y, cx - x);
    const lx1 = x + Math.cos(angle) * R;
    const ly1 = y + Math.sin(angle) * R;

    const [r2,g2,b2]=heatColor(t.fg3pct);
    ctx.strokeStyle=`rgba(${r2},${g2},${b2},0.75)`;
    ctx.lineWidth=1;
    ctx.setLineDash([3,2]);
    ctx.beginPath();
    ctx.moveTo(lx1, ly1);
    ctx.lineTo(cx, cy + 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Callout label in white
    ctx.font=`bold ${calloutFs}px Arial`; ctx.textAlign='left';
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText(t.abbr, cx, cy);
  });
}

function resize(){
  const w=canvas.parentElement.clientWidth;
  const h=Math.round(w*0.63);
  canvas.width=w; canvas.height=h;
  draw();
}

// Tooltip
const tip=document.getElementById('tooltip');
canvas.addEventListener('mousemove', e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
  const W=canvas.width, H=canvas.height;
  const R=Math.max(7,W/68)*1.265;
  let found=null;
  for(const t of teams){
    const x=px(t.wins,W), y=py(t.fg3m,H);
    if(Math.hypot(mx-x,my-y)<R+6){found=t;break;}
  }
  if(found){
    const [r,g,b]=heatColor(found.fg3pct);
    tip.style.display='block';
    // Position tooltip, flipping left if near right edge
    const tipW = 180;
    const tipH = 90;
    let tx = e.clientX - rect.left + 16;
    let ty = e.clientY - rect.top - 14;
    if (tx + tipW > rect.width) tx = e.clientX - rect.left - tipW - 16;
    if (ty - tipH < 0) ty = e.clientY - rect.top + 16;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';
    tip.innerHTML=`<div class="tn" style="color:rgb(${r},${g},${b})">${found.name}</div>
      <div><span class="st">Wins: </span><span class="vl">${found.wins}</span></div>
      <div><span class="st">3PM/G: </span><span class="vl">${found.fg3m.toFixed(1)}</span></div>
      <div><span class="st">3PT%: </span><span class="vl">${(found.fg3pct*100).toFixed(1)}%</span></div>`;
  } else { tip.style.display='none'; }
});
canvas.addEventListener('mouseleave',()=>tip.style.display='none');

// Legend
const lg=document.getElementById('lg');
const lc=lg.getContext('2d');
const grd=lc.createLinearGradient(0,0,180,0);
for(let i=0;i<=20;i++){
  const t=i/20;
  const [r,g,b]=heatColor(minP+t*(maxP-minP));
  grd.addColorStop(t,`rgb(${r},${g},${b})`);
}
lc.fillStyle=grd; lc.fillRect(0,0,180,13);

// Add numeric labels below gradient
const labelEl = document.getElementById('lg-labels');
const labelVals = [34, 35, 36, 37, 38, 39, 40];
labelVals.forEach((v, i) => {
  const span = document.createElement('span');
  span.textContent = v + '%';
  span.style.textAlign = i === 0 ? 'left' : i === labelVals.length - 1 ? 'right' : 'center';
  labelEl.appendChild(span);
});
labelEl.style.width = '180px';

resize();
window.addEventListener('resize',resize);
</script>
